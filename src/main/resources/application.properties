spring.application.name=backend

# Global Configuration (applies to all profiles)
# To run in production, ensure SPRING_PROFILES_ACTIVE=prod is set in your environment.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Hibernate Configuration Defaults
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=9a3c9b7e3f2e1d0f8a7c5b6e4d3a2b1c0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e
app.jwt.expiration=86400000

# Razorpay
razorpay.key.id=placeholder_id
razorpay.key.secret=placeholder_secret

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@example.com
spring.mail.password=placeholder
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Performance Optimization (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024
app.jwt.expiration-ms=86400000

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Spring Boot Actuator (System Metrics for Analytics Center)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.metrics.enabled=true
management.metrics.export.simple.enabled=true

# Hikari connection pool for DB metrics
spring.datasource.hikari.pool-name=AdminAnalyticsPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

