<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; border-bottom: 2px solid #e11d48; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #e11d48; margin: 0; font-size: 24px; }
        .content { color: #3f3f46; line-height: 1.6; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #a1a1aa; border-top: 1px solid #e4e4e7; padding-top: 15px; }
        .btn { display: inline-block; background-color: #e11d48; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Shimpi Bandhan</h1>
        </div>
        <div class="content">
            <h2>Hello <span th:text="${name}">User</span>,</h2>
<p>This is your PREMIUM EXPIRED notification from Shimpi Bandhan.</p>
<div th:if="${message} != null">
    <p th:text="${message}"></p>
</div>
<div th:if="${actionUrl} != null">
    <a th:href="${actionUrl}" class="btn">View Details</a>
</div>
        </div>
        <div class="footer">
            <p>&copy; 2026 Shimpi Bandhan Matrimony. All rights reserved.</p>
            <p>Dedicated to Aher & Namdev Shimpi Community</p>
        </div>
    </div>
</body>
</html>
