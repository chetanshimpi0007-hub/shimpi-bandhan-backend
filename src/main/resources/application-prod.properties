# Production Configuration (Render + Neon PostgreSQL)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Automatically map Render's default DATABASE_URL to Spring's datasource url
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Keep ddl-auto off or update
spring.jpa.hibernate.ddl-auto=update
